spring:
  application:
    name: nodus

  forward-headers-strategy: framework

  datasource:
    url: ${POSTGRESQL_URL:jdbc:postgresql://localhost:5432/nodus}
    username: ${POSTGRESQL_USERNAME:nodus}
    password: ${POSTGRESQL_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email

jwt:
  secret: "dev-secret-key-dev-secret-key-32-bytes!!"
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 1209600

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
