server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: nodus

  forward-headers-strategy: framework

  datasource:
    url: jdbc:h2:mem:nodus
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email

jwt:
  secret: "dev-secret-key-dev-secret-key-32-bytes!!"
  access-token-expiration-seconds: 3600
